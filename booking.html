<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>美甲预约</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #fff5f7;
}

/* 顶部 */
.header {
  text-align: center;
  padding: 40px;
  background: linear-gradient(135deg, #ff9eb5, #ffc3a0);
  color: white;
}

/* 作品 */
.gallery {
  padding: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}

.grid img {
  width: 100%;
  border-radius: 10px;
}

/* 预约 */
.booking {
  display: flex;
  justify-content: center;
  padding: 30px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  background: #ff6f91;
  color: white;
  border: none;
  border-radius: 8px;
}

.msg {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>💅 美甲预约</h1>
  <p>专业美甲 · 在线预约</p>
</div>

<!-- 作品展示 -->
<div class="gallery">
  <h2>✨ 我的作品</h2>
  <div class="grid" id="galleryGrid"></div>
</div>

<!-- 预约 -->
<div class="booking">
  <div class="card">
    <h2>预约时间</h2>

    <input type="text" id="name" placeholder="你的名字">
    <input type="email" id="email" placeholder="你的邮箱">
    <input type="date" id="date">

    <select id="time">
      <option>10:00</option>
      <option>11:00</option>
      <option>12:00</option>
      <option>13:00</option>
      <option>14:00</option>
    </select>

    <button onclick="book()">立即预约</button>

    <div id="msg" class="msg"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXeviALbueAUyOGdCx0M3sg7TF5fg_vf0",
  authDomain: "nail-booking-daa5d.firebaseapp.com",
  projectId: "nail-booking-daa5d",
  storageBucket: "nail-booking-daa5d.firebasestorage.app",
  messagingSenderId: "453192087054",
  appId: "1:453192087054:web:cd8e31489105942438ee5f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ✅ 加载作品
function loadGallery() {
  const grid = document.getElementById("galleryGrid");

  db.collection("gallery")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {
      grid.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const img = document.createElement("img");
        img.src = data.imageUrl;

        grid.appendChild(img);
      });
    });
}

// ✅ 预约
async function book() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const msg = document.getElementById("msg");

  if (!name || !email || !date) {
    msg.innerHTML = "❌ 请填写完整信息";
    return;
  }

  const id = date + "_" + time;

  const doc = await db.collection("appointments").doc(id).get();

  if (doc.exists) {
    msg.innerHTML = "❌ 该时间已被预约";
    return;
  }

  await db.collection("appointments").doc(id).set({
    name,
    email,
    date,
    time,
    createdAt: new Date()
  });

  msg.innerHTML = "✅ 预约成功！";
}

loadGallery();
</script>

</body>
</html>
